<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이든에듀 카드뉴스 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --navy: #181736; --gold: #F3A712; --white: #ffffff; --text-gray: #6b7280; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f0f0f5; min-height: 100vh; color: var(--navy); }

  .app-header { background: var(--navy); color: var(--white); padding: 18px 32px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .logo-mark { width: 36px; height: 36px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: var(--navy); }
  .app-header h1 { font-size: 18px; font-weight: 700; }
  .app-header span { font-size: 13px; color: rgba(255,255,255,0.5); margin-left: 4px; }

  .container { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 64px); }
  .sidebar { background: var(--white); border-right: 1px solid #e5e7eb; padding: 28px 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--text-gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 600; color: var(--navy); }
  input[type="text"], textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-family: 'Pretendard', sans-serif; font-size: 14px; color: var(--navy); background: #fafafa; transition: border-color 0.2s; outline: none; }
  input:focus, textarea:focus { border-color: var(--gold); background: #fff; }
  textarea { resize: vertical; min-height: 80px; }
  .hint { font-size: 11px; color: var(--text-gray); }

  .btn { padding: 11px 20px; border-radius: 10px; font-family: 'Pretendard', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--gold); color: var(--navy); width: 100%; padding: 14px; font-size: 15px; border-radius: 12px; }
  .btn-primary:hover { background: #e09800; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; color: #999; cursor: not-allowed; transform: none; }
  .btn-sm { background: var(--navy); color: var(--white); padding: 10px 14px; font-size: 12px; border-radius: 8px; white-space: nowrap; }
  .btn-sm:hover { background: #2a2856; }
  .btn-outline { background: transparent; border: 1.5px solid var(--navy); color: var(--navy); padding: 10px 16px; font-size: 13px; border-radius: 8px; }
  .btn-outline:hover { background: var(--navy); color: var(--white); }
  .divider { border: none; border-top: 1px solid #e5e7eb; }

  .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .style-chip { padding: 10px 8px; border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-gray); transition: all 0.2s; background: #fafafa; }
  .style-chip.active { border-color: var(--gold); background: #fff9ec; color: var(--navy); }
  .style-chip .chip-icon { font-size: 20px; margin-bottom: 4px; }
  .tone-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .tone-chip { padding: 6px 12px; border-radius: 20px; border: 1.5px solid #e5e7eb; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-gray); background: #fafafa; transition: all 0.2s; }
  .tone-chip.active { border-color: var(--navy); background: var(--navy); color: var(--white); }

  .status-box { background: #fff9ec; border: 1.5px solid var(--gold); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--navy); display: none; word-break: break-all; line-height: 1.6; }
  .status-box.show { display: block; }
  .status-box.error { background: #fff0f0; border-color: #e74c3c; color: #c0392b; }

  .preview-area { background: #e8e8ee; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; gap: 20px; overflow-y: auto; }
  .preview-toolbar { display: flex; gap: 10px; align-items: center; background: white; padding: 10px 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); width: 100%; max-width: 680px; }
  .preview-toolbar span { font-size: 13px; font-weight: 600; color: var(--text-gray); flex: 1; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: #aaa; text-align: center; }
  .empty-icon { font-size: 64px; }
  .empty-state h3 { font-size: 18px; font-weight: 700; color: #999; }
  .empty-state p { font-size: 13px; color: #bbb; }

  .a4-wrapper { width: 794px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); border-radius: 4px; overflow: hidden; background: white; }
  .a4-card { width: 794px; min-height: 1123px; display: flex; flex-direction: column; font-family: 'Pretendard', sans-serif; position: relative; overflow: hidden; }
  .card-header { background: var(--navy); padding: 56px 56px 44px; position: relative; overflow: hidden; }
  .card-header::before { content: ''; position: absolute; right: -60px; top: -60px; width: 300px; height: 300px; border-radius: 50%; background: rgba(243,167,18,0.12); }
  .card-header::after { content: ''; position: absolute; right: 40px; bottom: -80px; width: 200px; height: 200px; border-radius: 50%; background: rgba(243,167,18,0.08); }
  .tag { display: inline-block; background: var(--gold); color: var(--navy); font-size: 11px; font-weight: 800; padding: 5px 14px; border-radius: 20px; margin-bottom: 20px; letter-spacing: 0.05em; }
  .card-title { font-size: 36px; font-weight: 900; color: var(--white); line-height: 1.25; margin-bottom: 16px; position: relative; z-index: 1; }
  .card-subtitle { font-size: 15px; color: rgba(255,255,255,0.65); line-height: 1.6; position: relative; z-index: 1; }
  .card-body { flex: 1; padding: 44px 56px; display: flex; flex-direction: column; gap: 28px; background: #fff; }
  .card-footer { background: var(--navy); padding: 20px 56px; display: flex; align-items: center; justify-content: space-between; }
  .footer-brand { font-size: 14px; font-weight: 800; color: var(--white); }
  .footer-brand span { color: var(--gold); }
  .footer-date { font-size: 12px; color: rgba(255,255,255,0.45); }

  .info-section { display: flex; flex-direction: column; gap: 16px; }
  .info-section-title { font-size: 13px; font-weight: 800; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; padding-bottom: 8px; border-bottom: 2px solid var(--gold); display: inline-block; }
  .point-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .point-card { background: #f8f8fc; border-radius: 14px; padding: 20px; border-left: 4px solid var(--gold); display: flex; flex-direction: column; gap: 8px; }
  .pc-num { font-size: 11px; font-weight: 800; color: var(--gold); letter-spacing: 0.1em; }
  .pc-title { font-size: 15px; font-weight: 800; color: var(--navy); line-height: 1.3; }
  .pc-body { font-size: 12.5px; color: #555; line-height: 1.6; }
  .stat-row { display: flex; gap: 14px; }
  .stat-box { flex: 1; background: var(--navy); border-radius: 14px; padding: 22px 18px; text-align: center; color: white; }
  .stat-val { font-size: 32px; font-weight: 900; color: var(--gold); line-height: 1; }
  .stat-unit { font-size: 14px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 11.5px; color: rgba(255,255,255,0.65); margin-top: 6px; }
  .quote-block { background: linear-gradient(135deg, var(--navy) 0%, #2a2856 100%); border-radius: 16px; padding: 28px 32px; position: relative; overflow: hidden; }
  .quote-block::before { content: '"'; position: absolute; top: -10px; left: 16px; font-size: 100px; color: var(--gold); opacity: 0.2; font-family: Georgia, serif; line-height: 1; }
  .qb-text { font-size: 16px; font-weight: 700; color: var(--white); line-height: 1.6; position: relative; z-index: 1; }
  .qb-source { margin-top: 12px; font-size: 12px; color: var(--gold); font-weight: 600; position: relative; z-index: 1; }
  .timeline { display: flex; flex-direction: column; }
  .tl-item { display: flex; gap: 16px; padding-bottom: 20px; position: relative; }
  .tl-item:not(:last-child)::after { content: ''; position: absolute; left: 18px; top: 38px; bottom: 0; width: 2px; background: #e5e7eb; }
  .tl-dot { width: 36px; height: 36px; min-width: 36px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--navy); z-index: 1; }
  .tl-content { padding-top: 6px; }
  .tl-content strong { font-size: 14px; font-weight: 800; color: var(--navy); display: block; margin-bottom: 4px; }
  .tl-content p { font-size: 12.5px; color: #666; line-height: 1.6; }
  .summary-box { background: linear-gradient(135deg, #fffbf0, #fff5d6); border: 2px solid var(--gold); border-radius: 16px; padding: 24px 28px; }
  .sb-title { font-size: 13px; font-weight: 800; color: var(--gold); margin-bottom: 10px; letter-spacing: 0.05em; }
  .sb-text { font-size: 14px; color: var(--navy); line-height: 1.7; font-weight: 500; }

  .loading-overlay { position: fixed; inset: 0; background: rgba(24,23,54,0.75); display: none; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 20px; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { color: white; font-size: 16px; font-weight: 600; }
  .loading-overlay small { color: rgba(255,255,255,0.55); font-size: 13px; }

  @media print {
    body { background: white; }
    .sidebar, .preview-toolbar, .app-header { display: none; }
    .preview-area { padding: 0; background: white; }
    .a4-wrapper { box-shadow: none; }
    .container { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo-mark">E</div>
  <h1>이든에듀 카드뉴스 생성기</h1>
  <span>by Eden Edu</span>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>카드뉴스를 생성하는 중...</p>
  <small>기사를 분석하고 디자인을 적용하고 있어요</small>
</div>

<div class="container">
  <div class="sidebar">
    <div>
      <div class="section-label">🔗 기사 입력</div>
      <div class="input-group">
        <label>기사 URL</label>
        <input type="text" id="articleUrl" placeholder="https://..." />
        <span class="hint">뉴스, 블로그, 공식 보도자료 URL을 붙여넣으세요</span>
      </div>
      <div class="input-group" style="margin-top:12px">
        <label>추가 지시사항 <span style="color:#aaa;font-weight:400">(선택)</span></label>
        <textarea id="extraPrompt" placeholder="예) 의료기관 원무팀 대상으로 작성해주세요" rows="3"></textarea>
      </div>
    </div>
    <hr class="divider">
    <div>
      <div class="section-label">🎨 카드 스타일</div>
      <div class="style-grid">
        <div class="style-chip active" onclick="setStyle('bold',this)"><div class="chip-icon">💼</div>Bold 비즈니스</div>
        <div class="style-chip" onclick="setStyle('clean',this)"><div class="chip-icon">✨</div>Clean 미니멀</div>
        <div class="style-chip" onclick="setStyle('edu',this)"><div class="chip-icon">📚</div>Edu 교육형</div>
        <div class="style-chip" onclick="setStyle('news',this)"><div class="chip-icon">📰</div>News 뉴스형</div>
      </div>
    </div>
    <div>
      <div class="section-label">💬 톤 & 매너</div>
      <div class="tone-row">
        <div class="tone-chip active" onclick="setTone('professional',this)">전문적</div>
        <div class="tone-chip" onclick="setTone('friendly',this)">친근한</div>
        <div class="tone-chip" onclick="setTone('simple',this)">쉽고 간결</div>
        <div class="tone-chip" onclick="setTone('authoritative',this)">권위있는</div>
      </div>
    </div>
    <hr class="divider">
    <div id="statusBox" class="status-box"></div>
    <button class="btn btn-primary" id="generateBtn" onclick="generate()">✨ 카드뉴스 생성</button>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="flex:1;font-size:12px" onclick="window.print()">🖨️ 인쇄/PDF</button>
      <button class="btn btn-outline" style="flex:1;font-size:12px" onclick="copyHtml()">📋 HTML 복사</button>
    </div>
  </div>

  <div class="preview-area">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🗞️</div>
      <h3>아직 생성된 카드뉴스가 없어요</h3>
      <p>기사 URL을 입력하고 생성 버튼을 눌러주세요</p>
    </div>
    <div class="preview-toolbar" id="toolbar" style="display:none">
      <span id="toolbarTitle">카드뉴스 미리보기</span>
      <button class="btn btn-sm" onclick="window.print()">🖨️ 인쇄 / PDF 저장</button>
    </div>
    <div class="a4-wrapper" id="a4Wrapper" style="display:none">
      <div class="a4-card" id="a4Card"></div>
    </div>
  </div>
</div>

<script>
let selectedStyle = 'bold';
let selectedTone = 'professional';

const TONE_MAP = { professional:'전문적이고 신뢰감 있는', friendly:'친근하고 따뜻한', simple:'쉽고 간결한', authoritative:'권위있고 공신력 있는' };
const STYLE_MAP = { bold:'강렬하고 임팩트 있는 비즈니스 스타일', clean:'미니멀하고 깔끔한 스타일', edu:'교육적이고 정보 전달에 최적화된 스타일', news:'뉴스 매거진 스타일' };

function setStyle(s,el) { selectedStyle=s; document.querySelectorAll('.style-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }
function setTone(t,el) { selectedTone=t; document.querySelectorAll('.tone-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }
function showStatus(msg,isError) { const b=document.getElementById('statusBox'); b.textContent=msg; b.className='status-box show'+(isError?' error':''); }

async function generate() {
  const url = document.getElementById('articleUrl').value.trim();
  const extra = document.getElementById('extraPrompt').value.trim();
  if (!url) { showStatus('❌ 기사 URL을 입력해주세요.', true); return; }

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('loadingOverlay').classList.add('show');
  showStatus('⏳ 기사를 분석 중입니다...', false);

  const prompt = `다음 URL의 기사를 분석하여 이든에듀 브랜드 카드뉴스용 JSON을 만들어주세요.

URL: ${url}
톤: ${TONE_MAP[selectedTone]}
스타일: ${STYLE_MAP[selectedStyle]}
${extra ? '추가 지시사항: ' + extra : ''}

※ URL에서 직접 크롤링이 불가할 경우, URL의 도메인·경로·키워드를 분석하여 해당 주제에 맞는 전문적인 내용을 창작하세요.

반드시 아래 JSON 형식으로만 응답하세요. 마크다운 없이 순수 JSON만 출력하세요:
{
  "tag": "카테고리 태그 (10자 이내)",
  "title": "메인 제목 (임팩트 있게, 30자 이내)",
  "subtitle": "부제목 (50자 이내)",
  "date": "YYYY.MM.DD",
  "source": "출처 기관/매체명",
  "stats": [
    {"value": "숫자", "unit": "단위", "label": "설명"},
    {"value": "숫자", "unit": "단위", "label": "설명"},
    {"value": "숫자", "unit": "단위", "label": "설명"}
  ],
  "points": [
    {"title": "핵심포인트1", "body": "설명"},
    {"title": "핵심포인트2", "body": "설명"},
    {"title": "핵심포인트3", "body": "설명"},
    {"title": "핵심포인트4", "body": "설명"}
  ],
  "timeline": [
    {"label": "단계1", "text": "설명"},
    {"label": "단계2", "text": "설명"},
    {"label": "단계3", "text": "설명"}
  ],
  "quote": {"text": "핵심 메시지", "source": "출처"},
  "summary": "전체 요약 및 시사점"
}`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: '당신은 이든에듀(Eden Edu)의 카드뉴스 전문 에디터입니다. 반드시 JSON만 반환하고, 마크다운 코드블럭 없이 순수 JSON만 출력하세요.',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    console.log('API 응답:', JSON.stringify(data));

    // 오류 응답 체크
    if (data.error) {
      showStatus('❌ API 오류: ' + (data.error.message || data.error), true);
      return;
    }

    // content 배열 체크
    if (!data.content || !data.content[0] || !data.content[0].text) {
      showStatus('❌ 응답 오류: ' + JSON.stringify(data).slice(0, 200), true);
      return;
    }

    const raw = data.content[0].text.trim()
      .replace(/^```json\s*/i, '')
      .replace(/^```\s*/i, '')
      .replace(/\s*```$/i, '');

    let json;
    try {
      json = JSON.parse(raw);
    } catch(parseErr) {
      showStatus('❌ JSON 파싱 오류. 응답: ' + raw.slice(0, 200), true);
      return;
    }

    renderCard(json);
    showStatus('✅ 카드뉴스가 생성되었습니다!', false);

  } catch(e) {
    showStatus('❌ 네트워크 오류: ' + e.message, true);
    console.error(e);
  } finally {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

function renderCard(d) {
  const card = document.getElementById('a4Card');
  card.innerHTML = `
    <div class="card-header">
      <div class="tag">${esc(d.tag)}</div>
      <div class="card-title">${esc(d.title)}</div>
      <div class="card-subtitle">${esc(d.subtitle)}</div>
    </div>
    <div class="card-body">
      ${d.stats?.length ? `<div class="info-section"><div class="info-section-title">📊 핵심 수치</div><div class="stat-row">${d.stats.map(s=>`<div class="stat-box"><div class="stat-val">${esc(s.value)}<span class="stat-unit">${esc(s.unit)}</span></div><div class="stat-label">${esc(s.label)}</div></div>`).join('')}</div></div>` : ''}
      ${d.points?.length ? `<div class="info-section"><div class="info-section-title">🔑 핵심 포인트</div><div class="point-cards">${d.points.map((p,i)=>`<div class="point-card"><div class="pc-num">POINT ${String(i+1).padStart(2,'0')}</div><div class="pc-title">${esc(p.title)}</div><div class="pc-body">${esc(p.body)}</div></div>`).join('')}</div></div>` : ''}
      ${d.timeline?.length ? `<div class="info-section"><div class="info-section-title">📌 주요 흐름</div><div class="timeline">${d.timeline.map((t,i)=>`<div class="tl-item"><div class="tl-dot">${i+1}</div><div class="tl-content"><strong>${esc(t.label)}</strong><p>${esc(t.text)}</p></div></div>`).join('')}</div></div>` : ''}
      ${d.quote ? `<div class="quote-block"><div class="qb-text">${esc(d.quote.text)}</div><div class="qb-source">— ${esc(d.quote.source)}</div></div>` : ''}
      ${d.summary ? `<div class="summary-box"><div class="sb-title">💡 이든에듀 INSIGHT</div><div class="sb-text">${esc(d.summary)}</div></div>` : ''}
    </div>
    <div class="card-footer">
      <div class="footer-brand"><span>이든</span>에듀 · Eden Edu</div>
      <div class="footer-date">출처: ${esc(d.source||'-')} · ${esc(d.date||'')}</div>
    </div>`;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('a4Wrapper').style.display = 'block';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('toolbarTitle').textContent = d.title || '카드뉴스 미리보기';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
